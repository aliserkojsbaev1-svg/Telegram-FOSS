name: NacGram

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup SDK
      run: |
        mkdir -p ~/sdk
        cd ~/sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools/latest 2>/dev/null || mv tools cmdline-tools/latest 2>/dev/null
        yes | ./cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/sdk --licenses
        ./cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/sdk "platform-tools" "platforms;android-33" "build-tools;33.0.0"
    - name: Download NDK
      run: |
        cd ~/sdk
        mkdir -p ndk
        cd ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
        unzip -q android-ndk-r21e-linux-x86_64.zip
        mv android-ndk-r21e 21.4.7075529
    - uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Fix build files
      run: |
        sed -i 's/APP_VERSION_NAME/"1.0.0"/g' TMessagesProj/build.gradle
        sed -i 's/APP_VERSION_CODE/1/g' TMessagesProj/build.gradle
        sed -i '/defaultConfig.versionCode = Integer.parseInt/d' TMessagesProj/build.gradle
    - name: Build
      run: |
        echo "APP_ID=1" > API_KEYS
        echo "APP_HASH=nacgram" >> API_KEYS
        echo "sdk.dir=$HOME/sdk" > local.properties
        echo "ndk.dir=$HOME/sdk/ndk/21.4.7075529" >> local.properties
        echo "org.gradle.jvmargs=-Xmx4096m" > gradle.properties
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: NacGram
        path: TMessagesProj/build/outputs/apk/debug/*.apk
