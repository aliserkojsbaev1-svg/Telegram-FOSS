name: NacGram

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - run: |
        mkdir -p ~/sdk/cmdline-tools
        cd ~/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        export ANDROID_HOME=~/sdk
        yes | ~/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=~/sdk --licenses
        ~/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=~/sdk "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;21.4.7075529" "cmake;3.22.1"
        cd $GITHUB_WORKSPACE
        echo "APP_ID=1" > API_KEYS
        echo "APP_HASH=nacgram" >> API_KEYS
        echo "sdk.dir=$HOME/sdk" > local.properties
        echo "ndk.dir=$HOME/sdk/ndk/21.4.7075529" >> local.properties
        sed -i '/defaultConfig.versionCode = Integer.parseInt/d' TMessagesProj/build.gradle
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: NacGram
        path: TMessagesProj/build/outputs/apk/debug/*.apk
