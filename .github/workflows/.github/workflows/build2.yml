name: Build NacGram APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Install SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV
        
    - name: Accept licenses
      run: |
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses
        
    - name: Install SDK packages
      run: |
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;21.4.7075529" "cmake;3.22.1"
        
    - name: Create API_KEYS
      run: |
        echo "APP_ID=1" > API_KEYS
        echo "APP_HASH=abc123def456" >> API_KEYS
        
    - name: Create local.properties
      run: |
        echo "sdk.dir=$HOME/android-sdk" > local.properties
        echo "ndk.dir=$HOME/android-sdk/ndk/21.4.7075529" >> local.properties
        
    - name: Fix versionCode
      run: |
        sed -i 's/defaultConfig.versionCode = Integer.parseInt(APP_VERSION_CODE)/\/\/ removed/g' TMessagesProj/build.gradle
        
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NacGram-APK
        path: TMessagesProj/build/outputs/apk/debug/*.apk
