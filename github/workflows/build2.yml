name: Build NacGram APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0 ndk;21.4.7075529 cmake;3.22.1'
        
    - name: Create API_KEYS
      run: |
        echo "APP_ID=1" > API_KEYS
        echo "APP_HASH=abc123def456" >> API_KEYS
        
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/21.4.7075529" >> local.properties
        
    - name: Fix versionCode
      run: |
        sed -i 's/defaultConfig.versionCode = Integer.parseInt(APP_VERSION_CODE)/defaultConfig.versionCode = 1/' TMessagesProj/build.gradle
        
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NacGram-APK
        path: TMessagesProj/build/outputs/apk/debug/*.apk
